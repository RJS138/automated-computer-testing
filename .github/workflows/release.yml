name: Build and Release Touchstone

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Linux x86_64 ─────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (x86_64)
    # Use oldest supported Ubuntu for lowest glibc requirement (~2.35).
    # Binaries built here run on Ubuntu 22.04+ and most modern distros.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build
        run: |
          chmod +x build/linux/build.sh
          bash build/linux/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-linux-x86_64
          path: dist/linux/touchstone_x86_64
          if-no-files-found: error

  # ── macOS arm64 ──────────────────────────────────────────────────────────
  # GitHub no longer provides Intel (x86_64) macOS runners.
  # Intel Mac users can run the arm64 binary transparently via Rosetta 2.
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Tcl/Tk (for tkinter display/keyboard helpers)
        run: brew install tcl-tk

      - name: Build
        run: |
          chmod +x build/macos/build.sh
          bash build/macos/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-macos-arm64
          path: dist/macos/touchstone_arm64
          if-no-files-found: error

  # ── Windows x64 ──────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        shell: powershell
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: cmd
        run: build\windows\build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-windows-x64
          path: dist\windows\touchstone_x64.exe
          if-no-files-found: error

  # ── macOS x86_64 (self-hosted) ───────────────────────────────────────────
  # Requires a self-hosted runner registered with labels: [self-hosted, macos, x86_64]
  # To register: Settings → Actions → Runners → New self-hosted runner
  # This job is NOT in create-release's needs — it uploads to the release
  # independently once the runner picks it up.
  build-macos-x86_64:
    name: Build macOS (x86_64, self-hosted)
    runs-on: [self-hosted, macos, x86_64]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Tcl/Tk (for tkinter display/keyboard helpers)
        run: brew install tcl-tk

      - name: Build
        run: |
          chmod +x build/macos/build.sh
          bash build/macos/build.sh

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/macos/touchstone_x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
      - build-windows
    # Only run when a version tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir release
          cp "artifacts/touchstone-linux-x86_64/touchstone_x86_64"  release/touchstone_linux_x86_64
          cp "artifacts/touchstone-macos-arm64/touchstone_arm64"     release/touchstone_macos_arm64
          cp "artifacts/touchstone-windows-x64/touchstone_x64.exe"  release/touchstone_windows_x64.exe
          chmod +x release/touchstone_linux_x86_64 release/touchstone_macos_arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Touchstone ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon / M-series) | `touchstone_macos_arm64` |
            | macOS (Intel — run via Rosetta 2) | `touchstone_macos_arm64` |
            | Linux x86_64 | `touchstone_linux_x86_64` |
            | Windows x64 | `touchstone_windows_x64.exe` |

            ### macOS — first run
            ```
            chmod +x touchstone_macos_arm64
            xattr -d com.apple.quarantine touchstone_macos_arm64
            ./touchstone_macos_arm64
            ```
            > Intel Mac users: the arm64 binary runs transparently via Rosetta 2.

            ### Linux — first run
            ```
            chmod +x touchstone_linux_x86_64
            sudo ./touchstone_linux_x86_64
            ```

            ### Windows — first run
            Run `touchstone_windows_x64.exe` as Administrator.
          files: |
            release/touchstone_linux_x86_64
            release/touchstone_macos_arm64
            release/touchstone_windows_x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
