name: Build and Release PC Tester

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build Linux binary
        run: |
          chmod +x scripts/build-linux.sh
          scripts/build-linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: pctester-linux
          path: dist/linux/*
          if-no-files-found: error

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build macOS binary
        run: |
          chmod +x scripts/build-macos.sh
          scripts/build-macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pctester-macos-${{ matrix.arch }}
          path: dist/macos/pctester_${{ matrix.arch }}
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install UV
        shell: powershell
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows binaries
        shell: powershell
        run: |
          scripts\build-windows.bat

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pctester-windows
          path: dist/windows/*
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
      - build-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: PC Tester ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/pctester-linux/*
            artifacts/pctester-macos-*/**
            artifacts/pctester-windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

