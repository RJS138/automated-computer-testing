name: Build and Release Touchstone

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Linux x86 ─────────────────────────────────────────────────────────────
  build-linux-x86:
    name: Build Linux (x86)
    # Use oldest supported Ubuntu for lowest glibc requirement (~2.35).
    # Binaries built here run on Ubuntu 22.04+ and most modern distros.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build
        run: |
          chmod +x build/linux/build.sh
          bash build/linux/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-linux-x86
          path: "dist/linux/Touchstone (Linux x86)"
          if-no-files-found: error

  # ── Linux ARM ─────────────────────────────────────────────────────────────
  build-linux-arm:
    name: Build Linux (ARM)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build
        run: |
          chmod +x build/linux/build.sh
          bash build/linux/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-linux-arm
          path: "dist/linux/Touchstone (Linux ARM)"
          if-no-files-found: error

  # ── macOS Apple Silicon ───────────────────────────────────────────────────
  build-macos-apple-silicon:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Tcl/Tk (for tkinter display/keyboard helpers)
        run: brew install tcl-tk

      - name: Build
        run: |
          chmod +x build/macos/build.sh
          bash build/macos/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-macos-apple-silicon
          path: "dist/macos/Touchstone (Apple Silicon)"
          if-no-files-found: error

  # ── macOS Intel (self-hosted) ─────────────────────────────────────────────
  # GitHub no longer provides Intel (x86_64) macOS runners.
  # Intel Mac users can run the Apple Silicon binary transparently via Rosetta 2.
  # To register a self-hosted Intel Mac runner:
  #   Settings → Actions → Runners → New self-hosted runner
  #   Labels: [self-hosted, macos, x86_64]
  # This job is NOT in create-release's needs — it uploads to the release
  # independently once the runner picks it up.
  build-macos-intel:
    name: Build macOS (Intel, self-hosted)
    runs-on: [self-hosted, macos, x86_64]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Tcl/Tk (for tkinter display/keyboard helpers)
        run: brew install tcl-tk

      - name: Build
        run: |
          chmod +x build/macos/build.sh
          bash build/macos/build.sh

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "dist/macos/Touchstone (Intel)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows x64 ───────────────────────────────────────────────────────────
  build-windows-x64:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        shell: powershell
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: cmd
        run: build\windows\build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-windows-x64
          path: "dist\\windows\\Touchstone (Windows x64).exe"
          if-no-files-found: error

  # ── Windows ARM ───────────────────────────────────────────────────────────
  build-windows-arm:
    name: Build Windows (ARM)
    runs-on: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        shell: powershell
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: cmd
        run: build\windows\build_arm.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-windows-arm
          path: "dist\\windows\\Touchstone (Windows ARM).exe"
          if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86
      - build-linux-arm
      - build-macos-apple-silicon
      - build-windows-x64
      - build-windows-arm
    # Only run when a version tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir release
          cp "artifacts/touchstone-linux-x86/Touchstone (Linux x86)"           "release/Touchstone (Linux x86)"
          cp "artifacts/touchstone-linux-arm/Touchstone (Linux ARM)"            "release/Touchstone (Linux ARM)"
          cp "artifacts/touchstone-macos-apple-silicon/Touchstone (Apple Silicon)" "release/Touchstone (Apple Silicon)"
          cp "artifacts/touchstone-windows-x64/Touchstone (Windows x64).exe"   "release/Touchstone (Windows x64).exe"
          cp "artifacts/touchstone-windows-arm/Touchstone (Windows ARM).exe"   "release/Touchstone (Windows ARM).exe"
          chmod +x "release/Touchstone (Linux x86)" "release/Touchstone (Linux ARM)" "release/Touchstone (Apple Silicon)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Touchstone ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon / M-series) | `Touchstone (Apple Silicon)` |
            | macOS (Intel — runs via Rosetta 2) | `Touchstone (Apple Silicon)` |
            | Linux x86 | `Touchstone (Linux x86)` |
            | Linux ARM | `Touchstone (Linux ARM)` |
            | Windows x64 | `Touchstone (Windows x64).exe` |
            | Windows ARM | `Touchstone (Windows ARM).exe` |

            ### macOS — first run
            ```
            chmod +x "Touchstone (Apple Silicon)"
            xattr -d com.apple.quarantine "Touchstone (Apple Silicon)"
            ./"Touchstone (Apple Silicon)"
            ```
            > Intel Mac users: the Apple Silicon binary runs transparently via Rosetta 2.

            ### Linux — first run
            ```
            chmod +x "Touchstone (Linux x86)"   # or Touchstone (Linux ARM)
            sudo ./"Touchstone (Linux x86)"
            ```

            ### Windows — first run
            Run `Touchstone (Windows x64).exe` (or ARM variant) as Administrator.
          files: |
            release/Touchstone (Apple Silicon)
            release/Touchstone (Linux x86)
            release/Touchstone (Linux ARM)
            release/Touchstone (Windows x64).exe
            release/Touchstone (Windows ARM).exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
