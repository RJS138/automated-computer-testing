name: Build and Release Touchstone

# ── Triggers ──────────────────────────────────────────────────────────────────
# Normal path:   release-please merges its Release PR → creates v*.*.* tag → this runs.
# Hotfix path:   manually dispatch with an optional version override.
#
# The "Stamp version" step in every build job reads GITHUB_REF (for tag runs)
# or INPUT_VERSION (for manual runs) via build/stamp_version.py.  No untrusted
# content is ever interpolated directly into shell — all ${{ }} values are
# passed through environment variables and validated with a regex.

on:
  workflow_dispatch:
    inputs:
      version:
        description: >
          Version to stamp (e.g. 1.2.3). Leave empty to use pyproject.toml.
          Only needed for dev/hotfix builds — normal releases use release-please tags.
        required: false
        type: string
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

jobs:
  # ── Linux x86 ─────────────────────────────────────────────────────────────
  build-linux-x86:
    name: Build Linux (x86)
    # Use oldest supported Ubuntu for lowest glibc requirement (~2.35).
    # Binaries built here run on Ubuntu 22.04+ and most modern distros.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
          INPUT_VERSION: ${{ inputs.version }}
        run: python3 build/stamp_version.py

      - name: Install UV and patchelf
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # Ubuntu 22.04 apt ships patchelf 0.14 which lacks --clear-execstack
          # (added in 0.17).  Install the upstream binary directly instead.
          # Extract into a dedicated dir we own — tar errors if told to write
          # metadata back onto /tmp itself (Operation not permitted).
          mkdir -p /tmp/patchelf_install
          curl -L -o /tmp/patchelf.tar.gz \
            https://github.com/NixOS/patchelf/releases/download/0.18.0/patchelf-0.18.0-x86_64.tar.gz
          tar xzf /tmp/patchelf.tar.gz -C /tmp/patchelf_install
          sudo install /tmp/patchelf_install/bin/patchelf /usr/local/bin/patchelf
          patchelf --version

      - name: Build
        run: |
          chmod +x build/linux/build.sh
          bash build/linux/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-linux-x86
          path: dist/linux/touchstone_linux_x86_64
          if-no-files-found: error

  # ── Linux ARM ─────────────────────────────────────────────────────────────
  build-linux-arm:
    name: Build Linux (ARM)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
          INPUT_VERSION: ${{ inputs.version }}
        run: python3 build/stamp_version.py

      - name: Install UV and patchelf
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # Pin to upstream patchelf 0.18 to guarantee --clear-execstack support.
          mkdir -p /tmp/patchelf_install
          curl -L -o /tmp/patchelf.tar.gz \
            https://github.com/NixOS/patchelf/releases/download/0.18.0/patchelf-0.18.0-aarch64.tar.gz
          tar xzf /tmp/patchelf.tar.gz -C /tmp/patchelf_install
          sudo install /tmp/patchelf_install/bin/patchelf /usr/local/bin/patchelf
          patchelf --version

      - name: Build
        run: |
          chmod +x build/linux/build.sh
          bash build/linux/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-linux-arm
          path: dist/linux/touchstone_linux_arm64
          if-no-files-found: error

  # ── macOS Apple Silicon ───────────────────────────────────────────────────
  build-macos-apple-silicon:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
          INPUT_VERSION: ${{ inputs.version }}
        run: python3 build/stamp_version.py

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Tcl/Tk (for tkinter display/keyboard helpers)
        run: brew install tcl-tk

      - name: Build
        run: |
          chmod +x build/macos/build.sh
          bash build/macos/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-macos-apple-silicon
          path: dist/macos/touchstone_macos_arm64.dmg
          if-no-files-found: error

  # ── macOS Intel (self-hosted) ─────────────────────────────────────────────
  # GitHub no longer provides Intel (x86_64) macOS runners.
  # Intel Mac users can run the Apple Silicon binary transparently via Rosetta 2.
  # To register a self-hosted Intel Mac runner:
  #   Settings → Actions → Runners → New self-hosted runner
  #   Labels: [self-hosted, macos, x86_64]
  #
  # This job is intentionally NOT in create-release's needs list because
  # self-hosted runners may pick up the job later than GitHub-hosted ones.
  # softprops/action-gh-release will append the DMG to the existing release
  # (already created by release-please + create-release) whenever it completes.
  build-macos-intel:
    name: Build macOS (Intel, self-hosted)
    runs-on: [self-hosted, macos, x86_64]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
          INPUT_VERSION: ${{ inputs.version }}
        run: python3 build/stamp_version.py

      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Tcl/Tk (for tkinter display/keyboard helpers)
        run: brew install tcl-tk

      - name: Build
        run: |
          chmod +x build/macos/build.sh
          bash build/macos/build.sh

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/macos/touchstone_macos_x86_64.dmg
          # append_body not set — we do not change the release body set by release-please
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows x64 ───────────────────────────────────────────────────────────
  build-windows-x64:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
          INPUT_VERSION: ${{ inputs.version }}
        run: python3 build/stamp_version.py

      - name: Install UV
        shell: powershell
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install .NET 6 SDK (for SensorDump)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Install smartmontools and stage smartctl.exe
        shell: cmd
        run: |
          choco install smartmontools -y --no-progress
          if not exist "tools\windows\smartctl" mkdir "tools\windows\smartctl"
          copy "C:\Program Files\smartmontools\bin\smartctl.exe" "tools\windows\smartctl\smartctl.exe"
          echo Staged smartctl.exe for bundling.

      - name: Build
        shell: cmd
        run: build\windows\build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-windows-x64
          path: "dist\\windows\\Touchstone (Windows x64).exe"
          if-no-files-found: error

  # ── Windows ARM ───────────────────────────────────────────────────────────
  build-windows-arm:
    name: Build Windows (ARM)
    runs-on: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
          INPUT_VERSION: ${{ inputs.version }}
        run: python3 build/stamp_version.py

      - name: Install UV
        shell: powershell
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install .NET 6 SDK (for SensorDump)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Install smartmontools and stage smartctl.exe
        shell: cmd
        run: |
          choco install smartmontools -y --no-progress
          if not exist "tools\windows\smartctl" mkdir "tools\windows\smartctl"
          copy "C:\Program Files\smartmontools\bin\smartctl.exe" "tools\windows\smartctl\smartctl.exe"
          echo Staged smartctl.exe for bundling.

      - name: Build
        shell: cmd
        run: build\windows\build_arm.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-windows-arm
          path: "dist\\windows\\Touchstone (Windows ARM).exe"
          if-no-files-found: error

  # ── Live Linux ISO ────────────────────────────────────────────────────────
  build-live-iso:
    name: Build Live ISO (Linux x86)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
          INPUT_VERSION: ${{ inputs.version }}
        run: python3 build/stamp_version.py

      - name: Build live ISO
        run: |
          chmod +x scripts/build-iso.sh
          bash scripts/build-iso.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-live-iso
          path: dist/iso/touchstone-live.iso
          if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86
      - build-linux-arm
      - build-macos-apple-silicon
      - build-windows-x64
      - build-windows-arm
      - build-live-iso
    # Only run when a version tag is pushed — not on manual workflow_dispatch.
    # release-please has already created the GitHub Release with the changelog
    # body; this job downloads all artifacts and appends them to that release.
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      id-token: write   # required for OIDC-backed artifact attestation
      attestations: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir release
          cp artifacts/touchstone-linux-x86/touchstone_linux_x86_64          release/touchstone_linux_x86_64
          cp artifacts/touchstone-linux-arm/touchstone_linux_arm64            release/touchstone_linux_arm64
          cp artifacts/touchstone-macos-apple-silicon/touchstone_macos_arm64.dmg release/touchstone_macos_arm64.dmg
          cp "artifacts/touchstone-windows-x64/Touchstone (Windows x64).exe" release/touchstone_windows_x64.exe
          cp "artifacts/touchstone-windows-arm/Touchstone (Windows ARM).exe" release/touchstone_windows_arm64.exe
          cp artifacts/touchstone-live-iso/touchstone-live.iso                release/touchstone-live.iso
          chmod +x release/touchstone_linux_x86_64 release/touchstone_linux_arm64

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release/touchstone_linux_x86_64
            release/touchstone_linux_arm64
            release/touchstone_macos_arm64.dmg
            release/touchstone_windows_x64.exe
            release/touchstone_windows_arm64.exe
            release/touchstone-live.iso

      - name: Generate SHA256 checksums
        run: |
          cd release
          sha256sum \
            touchstone_linux_x86_64 \
            touchstone_linux_arm64 \
            touchstone_macos_arm64.dmg \
            touchstone_windows_x64.exe \
            touchstone_windows_arm64.exe \
            touchstone-live.iso \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          # release-please already set the release name and changelog body —
          # append_body: true adds the download table after the changelog.
          append_body: true
          body: |

            ---

            ## Platform Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon / M-series) | `touchstone_macos_arm64.dmg` |
            | macOS (Intel — runs via Rosetta 2) | `touchstone_macos_arm64.dmg` |
            | Linux x86 | `touchstone_linux_x86_64` |
            | Linux ARM | `touchstone_linux_arm64` |
            | Windows x64 | `touchstone_windows_x64.exe` |
            | Windows ARM | `touchstone_windows_arm64.exe` |
            | **Live Linux USB** (Ventoy bootable) | `touchstone-live.iso` |

            ### macOS — first run
            1. Download `touchstone_macos_arm64.dmg` and double-click to open
            2. Right-click `Touchstone` → **Open** to bypass Gatekeeper on first launch
            > Intel Mac users: the Apple Silicon DMG runs transparently via Rosetta 2.

            ### Linux — first run
            ```
            chmod +x touchstone_linux_x86_64   # or touchstone_linux_arm64
            sudo ./touchstone_linux_x86_64
            ```

            ### Windows — first run
            Run `touchstone_windows_x64.exe` (or `touchstone_windows_arm64.exe`) as Administrator.

            ### Live Linux USB
            Use `scripts/create_usb.sh` or `scripts/create_usb.ps1` — the ISO is downloaded automatically.
          files: |
            release/touchstone_macos_arm64.dmg
            release/touchstone_linux_x86_64
            release/touchstone_linux_arm64
            release/touchstone_windows_x64.exe
            release/touchstone_windows_arm64.exe
            release/touchstone-live.iso
            release/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
